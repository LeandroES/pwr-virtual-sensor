[alembic]
# Path to migration scripts — relative to this file (backend/)
script_location = alembic

# Add the backend/ directory to sys.path so `app.*` imports work
prepend_sys_path = .

# File name template for new revisions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision creation dates
timezone = UTC

# Truncate long revision slugs
truncate_slug_length = 40

# sqlalchemy.url is overridden in env.py via DATABASE_URL env var.
# This placeholder is required by alembic but never used at runtime.
sqlalchemy.url = postgresql+psycopg2://placeholder/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
