server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Requests to /api/* are proxied to FastAPI with the /api prefix stripped.
    # proxy_pass with a trailing / triggers Nginx's implicit URI substitution:
    #   /api/runs/        →  http://api:8000/runs/
    #   /api/runs/abc/status  →  http://api:8000/runs/abc/status
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
        # Disable response buffering so streaming works if added later
        proxy_buffering    off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Any path not matched by a real file returns index.html so React Router
    # (or future routing) works on hard reload / direct URL access.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite includes content hashes in filenames so immutable caching is safe.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires        1y;
        add_header     Cache-Control "public, immutable";
        access_log     off;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header Referrer-Policy         "strict-origin" always;
}
